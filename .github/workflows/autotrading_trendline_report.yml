# Trendline & S/R Analysis Report
#
# IMPORTANT: This workflow requires a self-hosted runner with IB Gateway running.
# GitHub-hosted runners cannot connect to IB Gateway (desktop app required).
#
# To set up:
# 1. Install IB Gateway on the self-hosted runner machine
# 2. Configure IB Gateway for auto-login
# 3. Register the runner with GitHub Actions
# 4. Set the required secrets in the repository
#
# For now, run the report locally:
#   python -m autotrading.run_trendline_report

name: Trendline & S/R Analysis Report

on:
  # Manual trigger only until self-hosted runner is available
  workflow_dispatch:
    inputs:
      reference_date:
        description: 'Reference date (YYYY-MM-DD), leave blank for yesterday'
        required: false
        default: ''

  # Future: uncomment when self-hosted runner is configured
  # schedule:
  #   - cron: '0 8 * * 2-6'  # Weekdays at 8:00 AM UTC

jobs:
  generate-report:
    # Change to: runs-on: self-hosted when ready
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trendline report
        env:
          SERVICE_ACCOUNT_KEY_GITHUB: ${{ secrets.SERVICE_ACCOUNT_KEY_GITHUB }}
          EMAIL_APP_PASSWORD_GITHUB: ${{ secrets.EMAIL_APP_PASSWORD_GITHUB }}
          EMAIL_LIST_GITHUB: ${{ secrets.EMAIL_LIST_GITHUB }}
        working-directory: .
        run: python -m autotrading.run_trendline_report

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: trendline-report
          path: autotrading/reports/*.html
          retention-days: 30
